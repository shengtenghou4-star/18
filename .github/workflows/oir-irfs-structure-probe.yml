name: OIR IRFS structure probe

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/irfs-structure-*'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Inspect public IRFS application assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p probe/assets
          python - <<'PY'
          from __future__ import annotations
          import json
          import re
          from pathlib import Path
          from urllib.parse import urljoin, urlparse
          import requests

          base = 'https://irfssearch.floir.gov/'
          session = requests.Session()
          session.headers['User-Agent'] = 'StormPrice public-records research probe/0.26'
          response = session.get(base, timeout=60)
          response.raise_for_status()
          Path('probe/index.html').write_bytes(response.content)
          Path('probe/headers.json').write_text(json.dumps(dict(response.headers), indent=2), encoding='utf-8')
          html = response.text
          srcs = re.findall(r'<script[^>]+src=["\']([^"\']+)', html, re.I)
          assets = []
          for idx, src in enumerate(srcs, start=1):
              url = urljoin(base, src)
              if urlparse(url).hostname != 'irfssearch.floir.gov':
                  continue
              r = session.get(url, timeout=60)
              r.raise_for_status()
              suffix = Path(urlparse(url).path).suffix or '.js'
              path = Path('probe/assets') / f'{idx:02d}{suffix}'
              path.write_bytes(r.content)
              text = r.text
              candidates = sorted(set(re.findall(r'''(?i)(?:https?://[^"'\s]+|/[A-Za-z0-9_.~!$&'()*+,;=:@%/-]*(?:api|search|filing|company|document)[A-Za-z0-9_.~!$&'()*+,;=:@%/?-]*)''', text)))
              assets.append({'url': url, 'file': str(path), 'bytes': len(r.content), 'candidates': candidates[:500]})
          Path('probe/assets.json').write_text(json.dumps(assets, indent=2), encoding='utf-8')
          combined = '\n'.join(Path(item['file']).read_text(encoding='utf-8', errors='replace') for item in assets)
          terms = ['QuickSearch', 'AdvancedSearch', 'FileLog', 'NAIC', 'CompanyName', 'DocumentRequest', 'api/', '/api', 'axios', 'fetch(']
          excerpts = {}
          for term in terms:
              positions = [m.start() for m in re.finditer(re.escape(term), combined, re.I)][:50]
              excerpts[term] = [combined[max(0, pos-250):pos+500] for pos in positions]
          Path('probe/excerpts.json').write_text(json.dumps(excerpts, indent=2), encoding='utf-8')
          PY
          sha256sum probe/index.html probe/headers.json probe/assets.json probe/excerpts.json probe/assets/* > probe/SHA256SUMS.txt
      - name: Upload structure artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-irfs-structure-probe
          path: probe/
          if-no-files-found: error
          retention-days: 1
