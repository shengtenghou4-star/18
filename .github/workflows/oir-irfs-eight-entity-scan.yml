name: OIR IRFS eight-entity scan

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/irfs-eight-entity-*'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Query public IRFS search endpoints
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scan/raw scan/entities
          python -m pip install --disable-pip-version-check --quiet requests beautifulsoup4
          python - <<'PY'
          from __future__ import annotations
          import json
          import re
          from datetime import datetime, timezone
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup

          BASE = 'https://irfssearch.floir.gov'
          ENTITIES = {
              'HRTG-HPCIC': ('14407', 'HOMEOWNERS CHOICE PROPERTY & CASUALTY INSURANCE COMPANY'),
              'UVE-UPCIC': ('10861', 'UNIVERSAL PROPERTY & CASUALTY INSURANCE COMPANY'),
              'UVE-APPCIC': ('13563', 'AMERICAN PLATINUM PROPERTY AND CASUALTY INSURANCE COMPANY'),
              'HCI-HCPCI': ('12944', 'HOMEOWNERS CHOICE PROPERTY & CASUALTY INSURANCE COMPANY'),
              'HCI-TYPTAP': ('15885', 'TYP TAP INSURANCE COMPANY'),
              'HCI-CORE': ('17547', 'CONDO OWNERS RECIPROCAL EXCHANGE'),
              'HCI-TAILROW': ('17706', 'TAILROW INSURANCE EXCHANGE'),
              'ACIC-AMCOASTAL': ('12968', 'AMERICAN COASTAL INSURANCE COMPANY'),
          }

          def base_criteria(code: str) -> dict:
              data = {
                  'area': 1,
                  'coNmSh': False, 'coNm': None, 'coNmSt': '2',
                  'coFeinSh': False, 'coFein': None, 'coFeinSt': '2',
                  'coNaicCoCdSh': True, 'coNaicCoCd': code, 'coNaicCoCdSt': '2',
                  'coNaicGrpCdSh': False, 'coNaicGrpCd': None, 'coNaicGrpCdSt': '2',
                  'filePfxSh': False, 'fileLogNumSh': False, 'fileLogNum': None, 'fileLogNumSt': '2',
                  'fileTypeSh': False, 'fileTypeForms': False, 'fileTypeRates': False,
                  'fileTypeBoth': False, 'fileTypePpa': False,
                  'formNumSh': False, 'formNum': None, 'formNumSt': '2',
                  'mktNmSh': False, 'mktNm': None, 'mktNmSt': '2',
                  'ppacaSh': False, 'ppaca': False,
                  'selProdType': '1', 'enableProd': True, 'disableProd': False,
                  'selProdCatSh': False, 'selProdCats': None, 'selProdCatStr': '',
                  'selRateProdCatSh': False, 'selRateProdCat': None,
                  'selLobSh': False, 'selLob': None,
                  'selToiSh': False, 'selToi': None,
                  'selSubToiSh': False, 'selSubToi': None,
                  'selKywdsSh': False, 'selKywds': None, 'selKywdStr': None,
                  'fileDtSh': True, 'fileDtFrom': '07/01/2024', 'fileDtTo': '07/23/2026',
                  'fileDtPastMonths': None,
                  'closeDtSh': False, 'closeDtFrom': None, 'closeDtTo': None,
                  'closeDtPastMonths': None,
                  'effDtNewSh': False, 'effDtNewFrom': None, 'effDtNewTo': None,
                  'effDtRenewSh': False, 'effDtRenewFrom': None, 'effDtRenewTo': None,
                  'selFinActSh': False, 'selFinActs': None,
              }
              adv_names = [
                  'rtChgReqAvg','rtChgReqMin','rtChgReqMax','rtChgApprAvg','rtChgApprMin',
                  'rtChgApprMax','trndApprAvg','trndApprMin','trndApprMax','benChgReqAvg',
                  'benChgApprAvg','numGrpCertIndPol','totAnnPremVol'
              ]
              adv = {'rtAndOr': 'And'}
              for name in adv_names:
                  adv[name+'Sh'] = False
                  adv[name] = None
                  adv[name+'St'] = None
              data['lhAdv'] = adv
              return data

          def start_session():
              session = requests.Session()
              session.headers['User-Agent'] = 'StormPrice public IRFS metadata scan/0.26'
              page = session.get(BASE + '/', timeout=60)
              page.raise_for_status()
              soup = BeautifulSoup(page.text, 'html.parser')
              token_node = soup.select_one('input[name="__RequestVerificationToken"]')
              if token_node is None or not token_node.get('value'):
                  raise RuntimeError('anti-forgery token missing')
              return session, token_node['value']

          summary = []
          for insurer_id, (code, expected_name) in ENTITIES.items():
              session, token = start_session()
              headers = {'__RequestVerificationToken': token}
              criteria = base_criteria(code)
              response = session.post(
                  BASE + '/Search/AdvancedSearch',
                  headers=headers,
                  data={'criteria': json.dumps(criteria, separators=(',', ':')), '__RequestVerificationToken': token},
                  timeout=120,
              )
              raw_path = Path('scan/raw') / f'{insurer_id}-advanced-search.bin'
              raw_path.write_bytes(response.content)
              record = {
                  'insurer_id': insurer_id,
                  'naic_code': code,
                  'expected_name': expected_name,
                  'search_status_code': response.status_code,
                  'search_content_type': response.headers.get('content-type'),
                  'search_bytes': len(response.content),
                  'search_error': None,
                  'result_count': 0,
                  'company_names': [],
                  'filings': [],
              }
              try:
                  response.raise_for_status()
                  payload = response.json()
                  Path('scan/raw', f'{insurer_id}-advanced-search.json').write_text(
                      json.dumps(payload, indent=2, default=str), encoding='utf-8'
                  )
                  data = payload.get('Data') or []
                  record['result_count'] = len(data)
                  record['company_names'] = sorted({str(x.get('CoNm','')).strip() for x in data if x.get('CoNm')})
                  def date_key(item):
                      value = str(item.get('FileDt') or '')
                      match = re.search(r'(-?\d{10,})', value)
                      return int(match.group(1)) if match else 0
                  for item in sorted(data, key=date_key, reverse=True)[:12]:
                      filing = dict(item)
                      fn = item.get('FileLogNumber')
                      fid = item.get('FilingId')
                      src = item.get('AppSrc')
                      if fn and fid and src:
                          detail_resp = session.post(
                              BASE + '/Search/GetFiling', headers=headers,
                              data={'fn': fn, 'id': fid, 'src': src, '__RequestVerificationToken': token},
                              timeout=120,
                          )
                          filing['detail_status_code'] = detail_resp.status_code
                          try:
                              filing['detail'] = detail_resp.json()
                          except Exception:
                              filing['detail_text'] = detail_resp.text[:5000]
                          docs_resp = session.post(
                              BASE + '/Search/GetDocuments', headers=headers,
                              data={'fn': fn, 'fid': fid, 'src': src, '__RequestVerificationToken': token},
                              timeout=120,
                          )
                          filing['documents_status_code'] = docs_resp.status_code
                          try:
                              docs_payload = docs_resp.json()
                              filing['documents'] = docs_payload
                          except Exception:
                              filing['documents_text'] = docs_resp.text[:5000]
                      record['filings'].append(filing)
              except Exception as exc:
                  record['search_error'] = f'{type(exc).__name__}: {exc}'
                  record['search_text'] = response.text[:10000]
              Path('scan/entities', f'{insurer_id}.json').write_text(
                  json.dumps(record, indent=2, default=str), encoding='utf-8'
              )
              summary.append({k: record[k] for k in [
                  'insurer_id','naic_code','expected_name','search_status_code',
                  'search_content_type','search_bytes','search_error','result_count','company_names'
              ]})
          Path('scan/summary.json').write_text(json.dumps({
              'captured_at_utc': datetime.now(timezone.utc).isoformat(),
              'official_base_url': BASE,
              'period_filter': '2024-07-01/2026-07-23',
              'entity_count': len(ENTITIES),
              'summary': summary,
              'automatic_document_request': False,
          }, indent=2), encoding='utf-8')
          PY
          sha256sum scan/summary.json scan/entities/*.json scan/raw/* > scan/SHA256SUMS.txt
      - name: Upload scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-irfs-eight-entity-scan
          path: scan/
          if-no-files-found: error
          retention-days: 1
