name: OIR IRFS deep metadata scan

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/irfs-deep-*'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Expand uncaptured public IRFS filing metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p scan/entities scan/raw
          python -m pip install --disable-pip-version-check --quiet requests beautifulsoup4
          python - <<'PY'
          from __future__ import annotations
          import json
          import re
          import time
          from datetime import datetime, timezone
          from pathlib import Path
          import requests
          from bs4 import BeautifulSoup

          BASE = 'https://irfssearch.floir.gov'
          ENTITIES = {
              'HRTG-HPCIC': ('14407', 'HERITAGE PROPERTY & CASUALTY INSURANCE COMPANY'),
              'UVE-UPCIC': ('10861', 'UNIVERSAL PROPERTY & CASUALTY INSURANCE COMPANY'),
              'UVE-APPCIC': ('13563', 'AMERICAN PLATINUM PROPERTY AND CASUALTY INSURANCE COMPANY'),
              'HCI-HCPCI': ('12944', 'HOMEOWNERS CHOICE PROPERTY & CASUALTY INSURANCE COMPANY, INC.'),
              'HCI-TYPTAP': ('15885', 'TYPTAP INSURANCE COMPANY'),
              'HCI-CORE': ('17547', 'CONDO OWNERS RECIPROCAL EXCHANGE'),
              'HCI-TAILROW': ('17706', 'TAILROW INSURANCE EXCHANGE'),
              'ACIC-AMCOASTAL': ('12968', 'AMERICAN COASTAL INSURANCE COMPANY'),
          }

          def criteria(code: str) -> dict:
              data = {
                  'area': 1,
                  'coNmSh': False, 'coNm': None, 'coNmSt': '2',
                  'coFeinSh': False, 'coFein': None, 'coFeinSt': '2',
                  'coNaicCoCdSh': True, 'coNaicCoCd': code, 'coNaicCoCdSt': '2',
                  'coNaicGrpCdSh': False, 'coNaicGrpCd': None, 'coNaicGrpCdSt': '2',
                  'filePfxSh': False, 'fileLogNumSh': False, 'fileLogNum': None, 'fileLogNumSt': '2',
                  'fileTypeSh': False, 'fileTypeForms': False, 'fileTypeRates': False,
                  'fileTypeBoth': False, 'fileTypePpa': False,
                  'formNumSh': False, 'formNum': None, 'formNumSt': '2',
                  'mktNmSh': False, 'mktNm': None, 'mktNmSt': '2',
                  'ppacaSh': False, 'ppaca': False,
                  'selProdType': '1', 'enableProd': True, 'disableProd': False,
                  'selProdCatSh': False, 'selProdCats': None, 'selProdCatStr': '',
                  'selRateProdCatSh': False, 'selRateProdCat': None,
                  'selLobSh': False, 'selLob': None,
                  'selToiSh': False, 'selToi': None,
                  'selSubToiSh': False, 'selSubToi': None,
                  'selKywdsSh': False, 'selKywds': None, 'selKywdStr': None,
                  'fileDtSh': True, 'fileDtFrom': '07/01/2024', 'fileDtTo': '07/23/2026',
                  'fileDtPastMonths': None,
                  'closeDtSh': False, 'closeDtFrom': None, 'closeDtTo': None,
                  'closeDtPastMonths': None,
                  'effDtNewSh': False, 'effDtNewFrom': None, 'effDtNewTo': None,
                  'effDtRenewSh': False, 'effDtRenewFrom': None, 'effDtRenewTo': None,
                  'selFinActSh': False, 'selFinActs': None,
              }
              adv_names = [
                  'rtChgReqAvg','rtChgReqMin','rtChgReqMax','rtChgApprAvg','rtChgApprMin',
                  'rtChgApprMax','trndApprAvg','trndApprMin','trndApprMax','benChgReqAvg',
                  'benChgApprAvg','numGrpCertIndPol','totAnnPremVol'
              ]
              adv = {'rtAndOr': 'And'}
              for name in adv_names:
                  adv[name+'Sh'] = False
                  adv[name] = None
                  adv[name+'St'] = None
              data['lhAdv'] = adv
              return data

          def date_key(item: dict) -> int:
              match = re.search(r'(-?\d{10,})', str(item.get('FileDt') or ''))
              return int(match.group(1)) if match else 0

          def session_and_token():
              session = requests.Session()
              session.headers['User-Agent'] = 'StormPrice public IRFS deep metadata scan/0.27'
              page = session.get(BASE + '/', timeout=60)
              page.raise_for_status()
              token_node = BeautifulSoup(page.text, 'html.parser').select_one(
                  'input[name="__RequestVerificationToken"]'
              )
              if token_node is None or not token_node.get('value'):
                  raise RuntimeError('anti-forgery token missing')
              return session, token_node['value']

          def post_json(session, token, path, data, attempts=3):
              error = None
              for attempt in range(attempts):
                  try:
                      response = session.post(
                          BASE + path,
                          headers={'__RequestVerificationToken': token},
                          data={**data, '__RequestVerificationToken': token},
                          timeout=120,
                      )
                      response.raise_for_status()
                      return response.json()
                  except Exception as exc:
                      error = exc
                      if attempt + 1 < attempts:
                          time.sleep(1.5 * (attempt + 1))
              raise RuntimeError(f'{path} failed after {attempts} attempts: {error}')

          summary = []
          for insurer_id, (code, expected_name) in ENTITIES.items():
              session, token = session_and_token()
              payload = post_json(
                  session,
                  token,
                  '/Search/AdvancedSearch',
                  {'criteria': json.dumps(criteria(code), separators=(',', ':'))},
              )
              all_results = sorted(payload.get('Data') or [], key=date_key, reverse=True)
              uncaptured = all_results[12:]
              expanded = []
              errors = []
              for index, item in enumerate(uncaptured, start=13):
                  filing = dict(item)
                  fn = item.get('FileLogNumber')
                  fid = item.get('FilingId')
                  src = item.get('AppSrc')
                  try:
                      if not (fn and fid and src):
                          raise ValueError('missing filing request identifiers')
                      filing['detail'] = post_json(
                          session, token, '/Search/GetFiling', {'fn': fn, 'id': fid, 'src': src}
                      )
                      filing['documents'] = post_json(
                          session, token, '/Search/GetDocuments', {'fn': fn, 'fid': fid, 'src': src}
                      )
                  except Exception as exc:
                      filing['expansion_error'] = f'{type(exc).__name__}: {exc}'
                      errors.append({'file_log_number': fn, 'error': filing['expansion_error']})
                  expanded.append(filing)
                  time.sleep(0.05)
              record = {
                  'insurer_id': insurer_id,
                  'naic_code': code,
                  'expected_name': expected_name,
                  'company_names': sorted({str(x.get('CoNm','')).strip() for x in all_results if x.get('CoNm')}),
                  'search_result_count': len(all_results),
                  'previously_captured_latest_count': min(12, len(all_results)),
                  'uncaptured_filing_count': len(uncaptured),
                  'expanded_filing_count': len(expanded) - len(errors),
                  'expansion_error_count': len(errors),
                  'errors': errors,
                  'filings': expanded,
              }
              Path('scan/entities', f'{insurer_id}.json').write_text(
                  json.dumps(record, indent=2, default=str), encoding='utf-8'
              )
              summary.append({k: record[k] for k in [
                  'insurer_id','naic_code','expected_name','company_names','search_result_count',
                  'previously_captured_latest_count','uncaptured_filing_count',
                  'expanded_filing_count','expansion_error_count'
              ]})
          Path('scan/summary.json').write_text(json.dumps({
              'captured_at_utc': datetime.now(timezone.utc).isoformat(),
              'official_base_url': BASE,
              'period_filter': '2024-07-01/2026-07-23',
              'entity_count': len(ENTITIES),
              'summary': summary,
              'automatic_document_request': False,
              'requester_identity_submitted': False,
              'captcha_submitted': False,
              'submit_request_endpoint_called': False,
          }, indent=2), encoding='utf-8')
          PY
          sha256sum scan/summary.json scan/entities/*.json > scan/SHA256SUMS.txt
      - name: Upload deep-scan artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-irfs-deep-metadata-scan
          path: scan/
          if-no-files-found: error
          retention-days: 1
