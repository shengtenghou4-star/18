name: OIR CHOICES public probe

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/choices-public-*'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Fetch public CHOICES page and static assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/assets
          python - <<'PY'
          import hashlib, json, re, ssl, urllib.parse, urllib.request
          from html.parser import HTMLParser
          from pathlib import Path

          BASE = 'https://choices.floir.gov/pandc/homeowners'
          OUT = Path('out')
          ctx = ssl.create_default_context()
          headers = {'User-Agent': 'StormPrice-public-source-audit/0.30 (+public metadata only)'}

          def fetch(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req, timeout=60, context=ctx) as r:
                  body = r.read()
                  meta = {
                      'url': r.geturl(),
                      'status': getattr(r, 'status', None),
                      'content_type': r.headers.get('Content-Type'),
                      'bytes': len(body),
                      'sha256': hashlib.sha256(body).hexdigest(),
                  }
                  return body, meta

          page, page_meta = fetch(BASE)
          (OUT/'homeowners.html').write_bytes(page)
          text = page.decode('utf-8', 'replace')

          class P(HTMLParser):
              def __init__(self):
                  super().__init__(); self.scripts=[]; self.links=[]
              def handle_starttag(self, tag, attrs):
                  d=dict(attrs)
                  if tag=='script' and d.get('src'): self.scripts.append(d['src'])
                  if tag=='link' and d.get('href'): self.links.append(d['href'])
          p=P(); p.feed(text)

          assets=[]
          for idx, src in enumerate(p.scripts):
              url=urllib.parse.urljoin(BASE, src)
              try:
                  body, meta=fetch(url)
                  suffix=Path(urllib.parse.urlparse(url).path).suffix or '.js'
                  path=OUT/'assets'/f'{idx:02d}{suffix}'
                  path.write_bytes(body)
                  meta['local_path']=str(path)
                  assets.append(meta)
              except Exception as e:
                  assets.append({'url':url,'error':repr(e)})

          corpus = text + '\n' + '\n'.join(
              Path(a['local_path']).read_text('utf-8','replace')
              for a in assets if a.get('local_path')
          )
          patterns = {
              'absolute_urls': r'https?://[^\"\'\s<>]+',
              'root_paths': r'[\"\'](/(?:api|pandc|homeowners|Homeowners|Rate|rate|County|county|Company|company|Export|export)[^\"\']*)[\"\']',
              'ajax_urls': r'(?:url|route|endpoint)\s*[:=]\s*[\"\']([^\"\']+)[\"\']',
              'fetch_calls': r'fetch\s*\(\s*[\"\']([^\"\']+)[\"\']',
              'controller_actions': r'[\"\'](/[^\"\']*(?:Get|Search|Export|Rates|Companies|Counties|Examples)[^\"\']*)[\"\']',
          }
          discoveries={}
          for name, pat in patterns.items():
              vals=[]
              for m in re.finditer(pat, corpus, re.I):
                  v=m.group(1) if m.lastindex else m.group(0)
                  if v not in vals: vals.append(v)
              discoveries[name]=vals[:500]

          keywords=['homeowner','county','company','example','rate','premium','export','ajax','api']
          excerpts=[]
          for source_name, source_text in [('homeowners.html', text)] + [
              (a['local_path'], Path(a['local_path']).read_text('utf-8','replace'))
              for a in assets if a.get('local_path')
          ]:
              low=source_text.lower()
              for kw in keywords:
                  start=0
                  for _ in range(12):
                      i=low.find(kw,start)
                      if i<0: break
                      excerpts.append({'source':source_name,'keyword':kw,'excerpt':source_text[max(0,i-220):i+420]})
                      start=i+len(kw)

          report={
              'base_url':BASE,
              'page':page_meta,
              'script_sources':p.scripts,
              'link_sources':p.links,
              'assets':assets,
              'discoveries':discoveries,
              'excerpts':excerpts[:300],
              'boundaries':{
                  'authenticated':False,
                  'captcha':False,
                  'requester_identity':False,
                  'private_project_source':False,
                  'irfs_request_endpoints_called':False,
                  'choices_public_page_only':True,
              },
          }
          (OUT/'report.json').write_text(json.dumps(report,indent=2),encoding='utf-8')
          with (OUT/'SHA256SUMS.txt').open('w') as f:
              for path in sorted(OUT.rglob('*')):
                  if path.is_file() and path.name!='SHA256SUMS.txt':
                      f.write(hashlib.sha256(path.read_bytes()).hexdigest()+'  '+str(path.relative_to(OUT))+'\n')
          print(json.dumps({'page':page_meta,'scripts':len(p.scripts),'assets_ok':sum('local_path' in a for a in assets),'discoveries':{k:len(v) for k,v in discoveries.items()}},indent=2))
          PY
      - name: Upload public-source artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-choices-public-probe
          path: out
          retention-days: 1
          if-no-files-found: error
