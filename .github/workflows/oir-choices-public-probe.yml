name: OIR CHOICES public acquisition

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/choices-public-*'

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Acquire public county and target-company rate matrices
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/raw/counties out/raw/companies
          python - <<'PY'
          import csv, hashlib, json, re, ssl, time, urllib.parse, urllib.request
          from pathlib import Path

          ROOT = 'https://choices.floir.gov'
          OUT = Path('out')
          ctx = ssl.create_default_context()
          headers = {'User-Agent': 'StormPrice-public-source-audit/0.30 (+public OIR CHOICES data)'}
          targets = {
              'HRTG-HPCIC': ['HERITAGE PROPERTY', 'HERITAGE PROPERTY & CASUALTY'],
              'UVE-UPCIC': ['UNIVERSAL PROPERTY', 'UNIVERSAL PROPERTY & CASUALTY'],
              'UVE-APPCIC': ['AMERICAN PLATINUM'],
              'HCI-HCPCI': ['HOMEOWNERS CHOICE', 'HOMEOWNERS CHOICE PROPERTY'],
              'HCI-TYPTAP': ['TYPTAP'],
              'HCI-CORE': ['CONDO OWNERS RECIPROCAL', 'CORE'],
              'HCI-TAILROW': ['TAILROW'],
              'ACIC-AMCOASTAL': ['AMERICAN COASTAL'],
          }
          request_log=[]

          def fetch_json(path, params=None, attempts=3):
              url = urllib.parse.urljoin(ROOT, path)
              if params:
                  url += ('&' if '?' in url else '?') + urllib.parse.urlencode(params)
              last=None
              for attempt in range(1, attempts+1):
                  try:
                      req=urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=60, context=ctx) as r:
                          body=r.read()
                          meta={'url':r.geturl(),'status':getattr(r,'status',None),'content_type':r.headers.get('Content-Type'),'bytes':len(body),'sha256':hashlib.sha256(body).hexdigest(),'attempt':attempt}
                          request_log.append(meta)
                          return json.loads(body.decode('utf-8-sig')), body, meta
                  except Exception as e:
                      last=e
                      request_log.append({'url':url,'attempt':attempt,'error':repr(e)})
                      time.sleep(attempt)
              raise RuntimeError(f'failed {url}: {last!r}')

          def safe(value):
              return re.sub(r'[^A-Za-z0-9_.-]+','_',str(value)).strip('_') or 'blank'

          def norm(value):
              return re.sub(r'[^A-Z0-9]+',' ',str(value).upper()).strip()

          def write_json(path, obj):
              path.parent.mkdir(parents=True,exist_ok=True)
              path.write_text(json.dumps(obj,indent=2,sort_keys=True),encoding='utf-8')

          init, init_body, init_meta = fetch_json('/PandC/Data/Init?iId=2')
          (OUT/'raw'/'init.json').write_bytes(init_body)
          examples=init.get('Examples') or []
          counties=init.get('Counties') or []
          write_json(OUT/'init_summary.json', {'examples':examples,'counties':counties,'meta':init_meta})

          all_county_rows=[]
          all_company_rows=[]
          company_catalog=[]
          target_matches=[]
          errors=[]

          for ex in examples:
              eid=ex.get('Id')
              ex_name=ex.get('DisplayName') or ex.get('Name') or str(eid)
              companies, body, meta = fetch_json('/PandC/Data/Companies?iId=2', {'eId':eid})
              (OUT/'raw'/'companies'/f'example_{safe(eid)}.json').write_bytes(body)
              for company in companies or []:
                  row={'example_id':eid,'example_name':ex_name,**company}
                  company_catalog.append(row)
                  cname=norm(company.get('Name'))
                  matched=[]
                  for insurer_id, needles in targets.items():
                      if any(norm(n) in cname for n in needles): matched.append(insurer_id)
                  if matched:
                      target_matches.append({'example_id':eid,'example_name':ex_name,'company':company,'insurer_ids':matched})
                      try:
                          rates, rb, rm = fetch_json('/PandC/Data/CompanyRates?iId=2', {'eId':eid,'company':company.get('Id')})
                          (OUT/'raw'/'companies'/f'example_{safe(eid)}_company_{safe(company.get("Id"))}.json').write_bytes(rb)
                          for rate in rates.get('Rates') or []:
                              all_company_rows.append({'example_id':eid,'example_name':ex_name,'company_id':company.get('Id'),'company_name':company.get('Name'),'rate_column':rates.get('RateColumn'),'rate2_column':rates.get('Rate2Column'),**rate})
                      except Exception as e:
                          errors.append({'scope':'company_rates','example_id':eid,'company':company,'error':repr(e)})
                      time.sleep(0.05)

              for county in counties:
                  county_name=county.get('Name') if isinstance(county,dict) else county
                  try:
                      rates, rb, rm = fetch_json('/PandC/Data/CountyRates?iId=2', {'eId':eid,'county':county_name})
                      (OUT/'raw'/'counties'/f'example_{safe(eid)}_county_{safe(county_name)}.json').write_bytes(rb)
                      for rate in rates.get('Rates') or []:
                          all_county_rows.append({'example_id':eid,'example_name':ex_name,'query_county':county_name,'rate_column':rates.get('RateColumn'),'rate2_column':rates.get('Rate2Column'),**rate})
                  except Exception as e:
                      errors.append({'scope':'county_rates','example_id':eid,'county':county_name,'error':repr(e)})
                  time.sleep(0.05)

          def write_csv(path, rows):
              keys=[]
              for row in rows:
                  for k in row:
                      if k not in keys: keys.append(k)
              with path.open('w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=keys,extrasaction='ignore')
                  w.writeheader()
                  for row in rows: w.writerow(row)

          write_csv(OUT/'company_catalog.csv', company_catalog)
          write_csv(OUT/'county_rate_matrix.csv', all_county_rows)
          write_csv(OUT/'target_company_rate_matrix.csv', all_company_rows)
          write_json(OUT/'target_company_matches.json', target_matches)
          write_json(OUT/'request_log.json', request_log)
          write_json(OUT/'errors.json', errors)

          matched_ids=sorted({i for m in target_matches for i in m['insurer_ids']})
          report={
              'source':'Florida OIR CHOICES Homeowners Rate Comparison Tool',
              'source_url':'https://choices.floir.gov/pandc/homeowners',
              'examples':len(examples),
              'counties':len(counties),
              'company_catalog_rows':len(company_catalog),
              'county_rate_rows':len(all_county_rows),
              'target_company_rate_rows':len(all_company_rows),
              'target_entities_matched':matched_ids,
              'target_entities_unmatched':sorted(set(targets)-set(matched_ids)),
              'target_match_records':len(target_matches),
              'request_count':len([x for x in request_log if 'status' in x]),
              'errors':len(errors),
              'claim_boundary':'CHOICES rates are illustrative sample average premiums from recent approved filings. They are not policy counts, exposure, direct written premium, availability, quotes, or March 2026 county/ZIP exposure.',
              'boundaries':{
                  'public_get_only':True,
                  'authenticated':False,
                  'captcha':False,
                  'requester_identity':False,
                  'private_project_source':False,
                  'irfs_request_endpoints_called':False,
                  'document_requests_submitted':False,
              },
          }
          write_json(OUT/'report.json',report)
          with (OUT/'SHA256SUMS.txt').open('w') as f:
              for path in sorted(OUT.rglob('*')):
                  if path.is_file() and path.name!='SHA256SUMS.txt':
                      f.write(hashlib.sha256(path.read_bytes()).hexdigest()+'  '+str(path.relative_to(OUT))+'\n')
          print(json.dumps(report,indent=2))
          PY
      - name: Upload public-source artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-choices-public-acquisition
          path: out
          retention-days: 1
          if-no-files-found: error
