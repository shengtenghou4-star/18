name: OIR CHOICES target-company acquisition

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/choices-public-*'

permissions:
  contents: read

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Acquire public target-company county rate surfaces
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/raw
          python - <<'PY'
          import csv, hashlib, json, re, ssl, time, urllib.parse, urllib.request
          from pathlib import Path

          ROOT='https://choices.floir.gov'; OUT=Path('out')
          ctx=ssl.create_default_context()
          headers={'User-Agent':'StormPrice-public-source-audit/0.30 (+public OIR CHOICES data)'}
          targets={
            'HRTG-HPCIC':['HERITAGE PROPERTY'],
            'UVE-UPCIC':['UNIVERSAL PROPERTY'],
            'UVE-APPCIC':['AMERICAN PLATINUM'],
            'HCI-HCPCI':['HOMEOWNERS CHOICE'],
            'HCI-TYPTAP':['TYPTAP','TYP TAP'],
            'HCI-CORE':['CONDO OWNERS RECIPROCAL'],
            'HCI-TAILROW':['TAILROW'],
            'ACIC-AMCOASTAL':['AMERICAN COASTAL'],
          }
          log=[]
          def norm(v): return re.sub(r'[^A-Z0-9]+',' ',str(v).upper()).strip()
          def safe(v): return re.sub(r'[^A-Za-z0-9_.-]+','_',str(v)).strip('_') or 'blank'
          def fetch(path,params=None):
            url=urllib.parse.urljoin(ROOT,path)
            if params: url+=('&' if '?' in url else '?')+urllib.parse.urlencode(params)
            last=None
            for attempt in range(1,4):
              try:
                req=urllib.request.Request(url,headers=headers)
                with urllib.request.urlopen(req,timeout=30,context=ctx) as r:
                  body=r.read(); meta={'url':r.geturl(),'status':r.status,'bytes':len(body),'sha256':hashlib.sha256(body).hexdigest(),'attempt':attempt}
                  log.append(meta); return json.loads(body.decode('utf-8-sig')),body
              except Exception as e:
                last=e; log.append({'url':url,'attempt':attempt,'error':repr(e)}); time.sleep(attempt)
            raise RuntimeError(f'{url}: {last!r}')
          def write_csv(path,rows):
            keys=[]
            for row in rows:
              for k in row:
                if k not in keys: keys.append(k)
            with path.open('w',newline='',encoding='utf-8') as f:
              w=csv.DictWriter(f,fieldnames=keys); w.writeheader(); w.writerows(rows)

          init,body=fetch('/PandC/Data/Init?iId=2'); (OUT/'raw'/'init.json').write_bytes(body)
          examples=init.get('Examples') or []; counties=init.get('Counties') or []
          catalog=[]; matches=[]; rates_out=[]; errors=[]
          for ex in examples:
            eid=ex.get('Id'); ename=ex.get('DisplayName') or ex.get('Name') or str(eid)
            companies,cb=fetch('/PandC/Data/Companies?iId=2',{'eId':eid})
            (OUT/'raw'/f'companies_{safe(eid)}.json').write_bytes(cb)
            for c in companies or []:
              catalog.append({'example_id':eid,'example_name':ename,**c})
              cname=norm(c.get('Name')); ids=[tid for tid,needles in targets.items() if any(norm(n) in cname for n in needles)]
              if not ids: continue
              match={'example_id':eid,'example_name':ename,'company':c,'insurer_ids':ids}; matches.append(match)
              try:
                rates,rb=fetch('/PandC/Data/CompanyRates?iId=2',{'eId':eid,'company':c.get('Id')})
                (OUT/'raw'/f'rates_{safe(eid)}_{safe(c.get("Id"))}.json').write_bytes(rb)
                for tid in ids:
                  for row in rates.get('Rates') or []:
                    rates_out.append({'insurer_id':tid,'example_id':eid,'example_name':ename,'company_id':c.get('Id'),'company_name':c.get('Name'),'county_name':row.get('Name'),'rate':row.get('Rate'),'rate2':row.get('Rate2'),'rate_column':rates.get('RateColumn'),'rate2_column':rates.get('Rate2Column')})
              except Exception as e: errors.append({'example_id':eid,'company':c,'error':repr(e)})
              time.sleep(.05)
          write_csv(OUT/'company_catalog.csv',catalog); write_csv(OUT/'target_company_rate_surface.csv',rates_out)
          (OUT/'target_matches.json').write_text(json.dumps(matches,indent=2),encoding='utf-8')
          (OUT/'request_log.json').write_text(json.dumps(log,indent=2),encoding='utf-8')
          matched=sorted({x for m in matches for x in m['insurer_ids']})
          report={'source':'Florida OIR CHOICES Homeowners Rate Comparison Tool','source_url':'https://choices.floir.gov/pandc/homeowners','examples':len(examples),'counties':len(counties),'company_catalog_rows':len(catalog),'target_match_records':len(matches),'target_rate_rows':len(rates_out),'target_entities_matched':matched,'target_entities_unmatched':sorted(set(targets)-set(matched)),'errors':len(errors),'request_count':len([x for x in log if 'status' in x]),'claim_boundary':'Illustrative sample average rates from recent approved filings; not policy counts, exposure, quotes, availability, or March 2026 county/ZIP exposure.','boundaries':{'public_get_only':True,'authenticated':False,'captcha':False,'requester_identity':False,'private_project_source':False,'irfs_request_endpoints_called':False,'document_requests_submitted':False}}
          (OUT/'errors.json').write_text(json.dumps(errors,indent=2),encoding='utf-8')
          (OUT/'report.json').write_text(json.dumps(report,indent=2),encoding='utf-8')
          with (OUT/'SHA256SUMS.txt').open('w') as f:
            for p in sorted(OUT.rglob('*')):
              if p.is_file() and p.name!='SHA256SUMS.txt': f.write(hashlib.sha256(p.read_bytes()).hexdigest()+'  '+str(p.relative_to(OUT))+'\n')
          print(json.dumps(report,indent=2))
          PY
      - name: Upload public-source artifact
        uses: actions/upload-artifact@v4
        with:
          name: oir-choices-target-company-acquisition
          path: out
          retention-days: 1
          if-no-files-found: error
