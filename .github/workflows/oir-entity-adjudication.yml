name: OIR entity adjudication

on:
  pull_request:
    branches: [main]
    paths:
      - 'probe-trigger/entities-*'

permissions:
  contents: read

jobs:
  adjudicate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - run: python -m pip install --disable-pip-version-check --quiet requests beautifulsoup4
      - name: Export each public OIR entity separately
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          cat > /tmp/entities.py <<'PY'
          from __future__ import annotations
          import hashlib, json, re, traceback
          from pathlib import Path
          from urllib.parse import urljoin
          import requests
          from bs4 import BeautifulSoup

          CRITERIA="https://qsrng.floir.gov/reports/ReportCriteria.aspx"
          VIEWER="https://qsrng.floir.gov/reports/ReportViewer.aspx"
          OUT=Path("evidence")
          ENTITIES=[
              {"insurer_id":"HRTG-HPCIC","naic":"14407","portal_id":"202847","name":"HERITAGE PROPERTY & CASUALTY INSURANCE COMPANY","trade_secret":True},
              {"insurer_id":"UVE-UPCIC","naic":"10861","portal_id":"104219","name":"UNIVERSAL PROPERTY & CASUALTY INSURANCE COMPANY","trade_secret":True},
              {"insurer_id":"UVE-APPCIC","naic":"13563","portal_id":"201909","name":"AMERICAN PLATINUM PROPERTY AND CASUALTY INSURANCE COMPANY","trade_secret":True},
              {"insurer_id":"HCI-HCPCI","naic":"12944","portal_id":"201559","name":"HOMEOWNERS CHOICE PROPERTY & CASUALTY INSURANCE COMPANY, INC.","trade_secret":True},
              {"insurer_id":"HCI-TYPTAP","naic":"15885","portal_id":"203626","name":"TYPTAP INSURANCE COMPANY","trade_secret":True},
              {"insurer_id":"HCI-CORE","naic":"17547","portal_id":"205459","name":"CONDO OWNERS RECIPROCAL EXCHANGE","trade_secret":True},
              {"insurer_id":"HCI-TAILROW","naic":"17706","portal_id":"205614","name":"TAILROW INSURANCE EXCHANGE","trade_secret":False},
              {"insurer_id":"ACIC-AMCOASTAL","naic":"12968","portal_id":"201598","name":"AMERICAN COASTAL INSURANCE COMPANY","trade_secret":True},
          ]
          QUERIES=[{"county_value":"All","county_label":"All"}]
          summary={"criteria_url":CRITERIA,"viewer_url":VIEWER,"entities":ENTITIES,"runs":[],"errors":[]}

          def sha(b): return hashlib.sha256(b).hexdigest()
          def bs(b): return BeautifulSoup(b,"html.parser")
          def safe(s): return re.sub(r"[^A-Za-z0-9._-]+","_",s).strip("_")

          def fields(html):
              form=bs(html).find("form")
              if form is None: raise RuntimeError("form missing")
              out=[]
              for n in form.find_all(["input","select","textarea"]):
                  name=n.get("name")
                  if not name or n.has_attr("disabled"): continue
                  if n.name=="input":
                      typ=(n.get("type") or "text").lower()
                      if typ in {"submit","button","image","file","reset"}: continue
                      if typ in {"radio","checkbox"} and not n.has_attr("checked"): continue
                      out.append((name,n.get("value","")))
                  elif n.name=="select":
                      opts=n.find_all("option"); chosen=[o for o in opts if o.has_attr("selected")]
                      if not chosen and opts and not n.has_attr("multiple"): chosen=[opts[0]]
                      out.extend((name,o.get("value",o.get_text(" ",strip=True))) for o in chosen)
                  else: out.append((name,n.get_text()))
              return out

          def post(session,html,updates=None,target="",button=None):
              updates=updates or {}; data=fields(html); remove=set(updates)|{"__EVENTTARGET","__EVENTARGUMENT"}
              data=[(k,v) for k,v in data if k not in remove]
              for k,v in updates.items():
                  vals=v if isinstance(v,list) else [v]
                  data.extend((k,str(x)) for x in vals)
              data.extend([("__EVENTTARGET",target),("__EVENTARGUMENT","")])
              if button: data.append(button)
              r=session.post(CRITERIA,files=[(k,(None,v)) for k,v in data],timeout=240,allow_redirects=True)
              r.raise_for_status(); return r.content

          def move(session,html,base,values):
              return post(session,html,{base+"$LeftBox":values},button=(base+"$MoveRight",">"))

          def export_one(entity,county_value,county_label):
              session=requests.Session(); session.headers.update({"User-Agent":"Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/126 Safari/537.36"})
              rec={"insurer_id":entity["insurer_id"],"naic":entity["naic"],"portal_id":entity["portal_id"],"name":entity["name"],"listed_trade_secret":entity["trade_secret"],"county_value":county_value,"county_label":county_label}
              html=session.get(CRITERIA,timeout=120).content
              html=post(session,html,{"ctl00$ContentPlaceHolder1$ddlFilingType":"2"},target="ctl00$ContentPlaceHolder1$ddlFilingType")
              html=post(session,html,{"ctl00$ContentPlaceHolder1$ddlYear":"2026"},target="ctl00$ContentPlaceHolder1$ddlYear")
              html=move(session,html,"ctl00$ContentPlaceHolder1$lstReportingPeriod",["706"])

              insurer_options={o.get("value"):o.get_text(" ",strip=True) for o in bs(html).find("select",attrs={"name":"ctl00$ContentPlaceHolder1$lstInsurers$LeftBox"}).find_all("option")}
              rec["live_portal_label"]=insurer_options.get(entity["portal_id"])
              rec["identity_exact_match"]=rec["live_portal_label"]==entity["name"]
              if not rec["identity_exact_match"]: raise RuntimeError(f"identity mismatch for {entity['insurer_id']}: {rec['live_portal_label']!r}")

              html=move(session,html,"ctl00$ContentPlaceHolder1$lstInsurers",[entity["portal_id"]])
              html=move(session,html,"ctl00$ContentPlaceHolder1$lstPolicyType",["All"])
              html=move(session,html,"ctl00$ContentPlaceHolder1$lstCounties",[county_value])
              html=move(session,html,"ctl00$ContentPlaceHolder1$lstDataElements",["9","10","1","3","4","12","13","11"])
              html=post(session,html,{"ctl00$ContentPlaceHolder1$radReportType":"MarketShare","ctl00$ContentPlaceHolder1$ddlFilingType":"2","ctl00$ContentPlaceHolder1$ddlYear":"2026"},button=("ctl00$ContentPlaceHolder1$btnSearch","Run Search"))
              viewer=session.get(VIEWER,timeout=240).content
              m=re.search(r'ExportUrlBase":"([^"]+)',viewer.decode("utf-8",errors="replace"))
              if not m: raise RuntimeError("ExportUrlBase missing")
              base=m.group(1).replace("\\u0026","&").replace("\\/","/")
              stem=safe(entity["insurer_id"]+"_"+county_label)
              (OUT/(stem+"_viewer.html")).write_bytes(viewer)
              rec["viewer_sha256"]=sha(viewer)
              for fmt,ext in [("EXCELOPENXML","xlsx"),("CSV","csv")]:
                  r=session.get(urljoin(VIEWER,base+fmt),timeout=360,allow_redirects=True); body=r.content
                  fn=f"{stem}.{ext}"; (OUT/fn).write_bytes(body)
                  rec[fmt.lower()]={"status":r.status_code,"content_type":r.headers.get("content-type",""),"bytes":len(body),"sha256":sha(body),"file":fn,"valid_xlsx":body.startswith(b"PK\x03\x04") if fmt=="EXCELOPENXML" else None}
              text=(OUT/(stem+".csv")).read_text(encoding="utf-8-sig",errors="replace")
              rec["trade_secret_suppression_message"]="Data Cannot be released because of Trade Secret" in text
              rec["csv_has_company_name"]=entity["name"].upper() in text.upper()
              rec["csv_preview"]=text[:800]
              rec["cookie_names"]=[c.name for c in session.cookies]
              return rec

          for entity in ENTITIES:
              try:
                  summary["runs"].append(export_one(entity,"All","All"))
              except Exception as exc:
                  summary["errors"].append({"insurer_id":entity["insurer_id"],"type":type(exc).__name__,"message":str(exc),"traceback":traceback.format_exc()})

          tailrow=next(e for e in ENTITIES if e["insurer_id"]=="HCI-TAILROW")
          try:
              summary["runs"].append(export_one(tailrow,"01","Dade"))
          except Exception as exc:
              summary["errors"].append({"insurer_id":"HCI-TAILROW","county":"Dade","type":type(exc).__name__,"message":str(exc),"traceback":traceback.format_exc()})

          (OUT/"entity_adjudication_summary.json").write_text(json.dumps(summary,indent=2),encoding="utf-8")
          PY
          python /tmp/entities.py
          sha256sum evidence/* > evidence/SHA256SUMS.txt
      - name: Upload adjudication evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oir-entity-adjudication
          path: evidence/
          if-no-files-found: error
          retention-days: 1
